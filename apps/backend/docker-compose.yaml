### SERVICES ###
services:
  postgres:
    image: postgres:17
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: security
      POSTGRES_PASSWORD: champion
      POSTGRES_DB: security_champion_stats
    volumes:
      - ./db/migration/:/docker-entrypoint-initdb.d/
      - postgres-data:/var/lib/postgresql/data
    networks:
      - postgres

### VOLUMES ###
volumes:
  postgres-data:
    name: postgres-data

### NETWORKS ###
networks:
  postgres:
    name: postgres
