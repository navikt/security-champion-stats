server:
  shutdown: graceful
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
      base-path: /internal
    endpoint:
      security:
        enabled: 'false'
      health:
        show-details: always

logging:
  level:
    org.hibernate.orm.connections.pooling: WARN

spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    token-validation:
      url: ${NAIS_TOKEN_INTROSPECTION_ENDPOINT}
      identity-provider: entra_id
      groups: d633d27b-a470-4b9d-984e-85499f126e18
  profiles:
    active: prod
  jackson:
    serialization:
      fail-on-empty-beans: false
  datasource:
    url: ${NAIS_DATABASE_SECURITY_CHAMPION_STATS_BACKEND_SECURITY_CHAMPION_STATS_DB_JDBC_URL}
    username: ${NAIS_DATABASE_SECURITY_CHAMPION_STATS_BACKEND_SECURITY_CHAMPION_STATS_DB_USERNAME}
    password: ${NAIS_DATABASE_SECURITY_CHAMPION_STATS_BACKEND_SECURITY_CHAMPION_STATS_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      auto-commit: true
      minimum-idle: 2
      maximum-pool-size: 10
      transaction-isolation: TRANSACTION_READ_COMMITTED
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  sql:
    init:
      mode: never


slack:
    token: ${SLACK_TOKEN}
    sc-channel-id: ${SLACK_SC_CHANNEL_ID}
    appsec-channel-id: ${SLACK_APPSEC_CHANNEL_ID}
    appsec-activity-channel-id: ${SLACK_APPSEC_ACTIVITY_CHANNEL_ID}
    playbook_url: https://sikkerhet.nav.no/docs/ny-security-champion/

graph:
    apiUrl: https://graph.microsoft.com/v1.0

springdoc:
  api-docs:
    enabled: true

swagger:
  username: admin
  password: ${SWAGGER_PASSWORD:swagger123}

pointsSystem:
  amount:
    meeting: 2
    message: 3
    response-message: 2
  levels:
    novice: 0
    apprentice: 100
    adept: 250
    expert: 500

jobs:
  reset-points:
    cron: 0 0 10 * */3 *
